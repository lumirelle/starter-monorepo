experimental_monorepo_root = true

[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"

[monorepo]
config_roots = [
  "docs/",
  "packages/*",
  "playground/"
]

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = { task = "//packages/...:dev" }

[tasks.build]
run = { task = "//packages/...:build" }

[tasks.start]
run = { task = "//packages/pkg-placeholder:start" }

[tasks."docs:dev"]
run = { task = "//docs:dev" }

[tasks."docs:build"]
run = { task = "//docs:build" }

[tasks."docs:start"]
run = { task = "//docs:start" }

[tasks.play]
run = { task = "//playground:play" }

[tasks.lint]
run = [
  "aubr oxlint",
  "aubr eslint"
]

[tasks."lint:fix"]
run = [
  "aubr oxlint --fix",
  "aubr eslint --fix"
]

[tasks.typecheck]
run = { tasks = [
  "//packages/...:typecheck",
  "//docs:typecheck",
  "//playground:typecheck"
] }

[tasks.unused]
run = "aubr unused"

[tasks.check]
run = { tasks = [
  "lint",
  "typecheck",
  "unused",
] }

[tasks.test]
depends = "build"
run = "aubr test"

[tasks."test:watch"]
run = "aubr test:watch"

[tasks.prerelease]
run = { tasks = [
  ":check",
  ":test"
] }

[tasks.release]
depends = ":prerelease"
run = """
echo "Updating lockfiles with bun. This is required to ensure that the lockfiles are updated with the new versions of the packages being released. This is a workaround for the fact that bun does not update lockfiles when releasing packages."
echo "See https://github.com/oven-sh/bun/issues/18906 and https://github.com/oven-sh/bun/issues/20477"
rm bun.lock
bun install --lockfile-only
git add bun.lock

aubr release
"""
raw = true
