experimental_monorepo_root = true

[env]
_.path = [ "./node_modules/.bin" ]

[tools]
# Environments
bun = "latest"
npm = "latest" # Used to release package (trust publisher)
aube = "latest"
# Linters & Formatters
pkl = "latest"
hk = "latest"
"npm:@arethetypeswrong/cli" = "latest"
"npm:publint" = "latest"
# Release
"npm:pkg-pr-new" = "latest"
"npm:bumpp" = "latest"
"npm:changelogithub" = "latest"

[monorepo]
config_roots = [
  "docs/",
  "packages/*",
  "playground/"
]

[deps.bun-aube]
description = "Automatically install dependencies via aube & bun's lockfile."
sources = [
  "package.json",
  "bun.lock"
]
outputs = [ "node_modules/" ]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install"
auto = true

[tasks.dev]
run = { task = "//packages/...:dev" }

[tasks.build]
run = { task = "//packages/...:build" }

[tasks.start]
run = { task = "//packages/pkg-placeholder:start" }

[tasks."docs:dev"]
run = { task = "//docs:dev" }

[tasks."docs:build"]
run = { task = "//docs:build" }

[tasks."docs:start"]
run = { task = "//docs:start" }

[tasks.play]
run = { task = "//playground:play" }

[tasks.check]
depends = "build"
run = "hk check --all"

[tasks.fix]
depends = "build"
run = "hk fix --all"

[tasks.test]
depends = "build"
# It seems like run vitest.cmd directly will cause
# tsnapi missing it's snapshot state...
run = "aubr vitest run"

[tasks."test:watch"]
run = "aubr vitest"

[tasks.prerelease]
run = { tasks = [
  ":check",
  ":test"
] }

[tasks.release]
depends = ":prerelease"
run = """
echo "Updating lockfiles with bun. This is required to ensure that the lockfiles are updated with the new versions of the packages being released. This is a workaround for the fact that bun does not update lockfiles when releasing packages."
echo "See https://github.com/oven-sh/bun/issues/18906 and https://github.com/oven-sh/bun/issues/20477"
rm bun.lock
bun install --lockfile-only
git add bun.lock

bumpp --recursive
"""
raw = true

[tasks.publish]
run = { task = "//packages/...:publish" }

[tasks."publish:commit"]
run = "pkg-pr-new publish --bun packages/*"
