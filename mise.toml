experimental_monorepo_root = true

[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"

[monorepo]
config_roots = [
  "docs/",
  "packages/*",
  "playground/"
]

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
depends = "//packages/*:dev"

[tasks.build]
depends = "//packages/*:build"

[tasks.start]
depends = "//packages/pkg-placeholder:start"

[tasks."docs:dev"]
run = "//docs:dev"

[tasks."docs:build"]
run = "//docs:build"

[tasks."docs:start"]
run = "//docs:start"

[tasks.play]
run = "//playground:play"

[tasks."lint:oxlint"]
run = "oxlint"

[tasks."lint:eslint"]
wait_for = ":lint:oxlint"
run = "eslint"

[tasks.lint]
depends = [
  ":lint:oxlint",
  ":lint:eslint"
]

[tasks."lint:fix:oxlint"]
run = "oxlint --fix"

[tasks."lint:fix:eslint"]
wait_for = ":lint:fix:oxlint"
run = "eslint --fix"

[tasks."lint:fix"]
depends = [
  ":lint:fix:oxlint",
  ":lint:fix:eslint"
]

[tasks.typecheck]
depends = [ "//packages/*:typecheck" ]

[tasks.unused]
run = "knip-bun"

[tasks.check]
depends = [
  ":typecheck",
  ":lint",
  ":unused"
]

[tasks.test]
depends = [ ":build" ]
run = "bun test --isolate"

[tasks.prerelease]
depends = [
  ":check",
  ":test"
]

[tasks.release]
depends = ":prerelease"
# See https://github.com/oven-sh/bun/issues/18906 and https://github.com/oven-sh/bun/issues/20477
run = "bumpp --all --recursive --execute 'bun ./scripts/update-lockfile.sh'"
raw = true
